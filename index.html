<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Lara 💙</title>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
            background: linear-gradient(to bottom, #001f3f, #0074D9);
        }

        /* CAMADAS */
        #background {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        #efeitos {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .conteudo {
            position: relative;
            z-index: 3;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            height: 100dvh;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        /* TEXTO */
        h1 {
            margin: 0;
        }

        p {
            margin: 10px 0;
        }

        /* BOTÕES */
        button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: white;
            color: #0074D9;
            margin-top: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            z-index: 4;
            position: relative;
        }

        button:active {
            transform: scale(0.92);
        }

        /* FOTO */
        .foto {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            border-radius: 15px;
            z-index: 3;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        /* ESTRELAS */
        .estrela {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            animation: piscar 2s infinite;
        }

        @keyframes piscar {
            50% {
                opacity: 0.2;
            }
        }

        /* QUEDA */
        @keyframes cair {
            to {
                transform: translateY(110vh);
            }
        }

        /* FINAL */
        #final {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 24px;
        }

        #fechar {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="background"></div>
    <div id="efeitos"></div>

    <div class="conteudo">
        <h1>💙 Lara 💙</h1>

        <p>Clique e descubra algo doce...</p>
        <button onclick="mostrar()">Clique aqui 🍬</button>

        <div id="mensagem"></div>

        <p>Você me ama? 💖</p>
        <button onclick="sim()">SIM 💖</button>
        <button id="nao" onclick="clicouNao()">NÃO 😅</button>
    </div>

    <img src="foto.jpg" class="foto">

    <div id="final">
        <div id="fechar" onclick="fecharFinal()">❌</div>
        <div id="textoFinal"></div>
    </div>

    <script>
        let cliquesNao = 0;

        /* 💬 mensagens */
        function mostrar() {
            document.getElementById("mensagem").innerText =
                "Você é tudo pra mim 💙";

            explodir();
        }

        /* 💥 explosão */
        function explodir() {
            const container = document.getElementById("efeitos");

            for (let i = 0; i < 20; i++) {
                const e = document.createElement("div");
                e.innerHTML = ["💖", "🌸", "🎀"][Math.floor(Math.random() * 3)];

                e.style.position = "absolute";
                e.style.left = Math.random() * 100 + "vw";
                e.style.top = Math.random() * 50 + "vh";

                e.style.transition = "1s";
                requestAnimationFrame(() => {
                    e.style.transform = `translateY(-100px)`;
                    e.style.opacity = 0;
                });

                container.appendChild(e);
                setTimeout(() => e.remove(), 1000);
            }
        }

        /* 😆 NÃO */
        function clicouNao() {
            cliquesNao++;

            fugir();

            if (cliquesNao >= 2) {
                abrirFinal("😏 Você me ama sim 💖");
                document.getElementById("nao").style.display = "none";
            }
        }

        /* 💖 SIM */
        function sim() {
            abrirFinal("💙 Eu sabia... te amo muito Lara 💙");
        }

        /* FINAL */
        function abrirFinal(texto) {
            document.getElementById("textoFinal").innerText = texto;
            document.getElementById("final").style.display = "flex";
        }

        function fecharFinal() {
            document.getElementById("final").style.display = "none";
        }

        /* fugir */
        function fugir() {
            const btn = document.getElementById("nao");

            btn.style.position = "fixed";
            btn.style.left = Math.random() * 70 + "vw";
            btn.style.top = Math.random() * 60 + "vh";
        }

        /* 🌸 queda */
        setInterval(() => {
            const e = document.createElement("div");
            e.innerHTML = ["🌸", "🎀"][Math.floor(Math.random() * 2)];

            e.style.position = "absolute";
            e.style.left = Math.random() * 100 + "vw";
            e.style.top = "-20px";
            e.style.animation = "cair 6s linear";

            document.getElementById("efeitos").appendChild(e);

            setTimeout(() => e.remove(), 6000);
        }, 400);

        /* ✨ estrelas */
        for (let i = 0; i < 40; i++) {
            const s = document.createElement("div");
            s.className = "estrela";
            s.style.left = Math.random() * 100 + "vw";
            s.style.top = Math.random() * 100 + "vh";
            document.getElementById("background").appendChild(s);
        }
    </script>

</body>

</html>
