<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Lara 💙</title>

    <style>
        html,
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            background: linear-gradient(to bottom, #001f3f, #0074D9);
            overflow-x: hidden;
        }

        /* 🌙 overlay */
        #overlayNoite {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #000814, #001d3d);
            opacity: 0;
            transition: opacity 3s ease;
            z-index: 0;
        }

        .noite #overlayNoite {
            opacity: 1;
        }

        /* 📱 layout */
        .conteudo {
            position: relative;
            z-index: 10;

            display: flex;
            flex-direction: column;
            align-items: center;

            padding: 40px 20px 120px;
            /* espaço pra foto */
            text-align: center;
        }

        h1 {
            margin: 20px 0 10px;
        }

        p {
            margin: 10px 0;
        }

        /* botões */
        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: white;
            color: #0074D9;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.9);
        }

        /* mensagem */
        #mensagem {
            margin-top: 15px;
            font-size: 20px;
            opacity: 0;
            transition: 1s;
        }

        /* 📸 FOTO AGORA NORMAL (SEM BUG) */
        .foto {
            width: 80%;
            max-width: 260px;
            border-radius: 15px;
            margin-top: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* 💌 final */
        #final {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 50;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            text-align: center;
            padding: 20px;
        }

        #fechar {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 28px;
            cursor: pointer;
        }

        /* animação queda */
        @keyframes cair {
            0% {
                transform: translateY(0px);
            }

            100% {
                transform: translateY(110vh);
            }
        }

        #efeitos {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="overlayNoite"></div>

    <div class="conteudo">
        <h1>💙 Lara 💙</h1>

        <p>Clique e descubra algo...</p>
        <button onclick="mostrar()">Clique aqui 🍬</button>

        <div id="mensagem"></div>

        <p>Você me ama? 💖</p>
        <button onclick="sim()">SIM 💖</button>
        <button id="nao" onclick="clicouNao()">NÃO 😅</button>

        <!-- FOTO AGORA FICA NO FINAL -->
        <img src="foto.jpg" class="foto">
    </div>

    <div id="efeitos"></div>

    <div id="final">
        <div id="fechar" onclick="fecharFinal()">❌</div>
        <div id="textoFinal"></div>
    </div>

    <script>
        let cliques = 0;
        let cliquesNao = 0;
        let escalaNao = 1;

        const mensagens = [
            "Princesa, você é minha pessoa favorita 🍬",
            "Seu sorriso deixa tudo mais bonito 💙",
            "Eu escolheria você todos os dias 🌸",
            "Você é meu lugar seguro 💕",
            "Te amo mais do que palavras conseguem dizer 💖"
        ];

        function mostrar() {
            cliques++;

            let msg = mensagens[Math.floor(Math.random() * mensagens.length)];
            let div = document.getElementById("mensagem");
            div.innerHTML = msg;
            div.style.opacity = 1;

            explodir();

            if (cliques >= 5) {
                abrirFinal("💙 saiba que eu te amo muito princesa 💙");
                cliques = 0;
            }
        }

        function explodir(qtd = 20) {
            const container = document.getElementById("efeitos");

            for (let i = 0; i < qtd; i++) {
                const item = document.createElement("div");
                item.innerHTML = ["💖", "🌸", "🎀"][Math.floor(Math.random() * 3)];

                item.style.position = "absolute";
                item.style.left = Math.random() * 100 + "vw";
                item.style.top = Math.random() * 50 + "vh";

                container.appendChild(item);
                setTimeout(() => item.remove(), 800);
            }
        }

        function sim() {
            explodir(60);
        }

        function clicouNao() {
            cliquesNao++;

            const btn = document.getElementById("nao");

            escalaNao -= 0.1;
            if (escalaNao < 0.5) escalaNao = 0.5;
            btn.style.transform = `scale(${escalaNao})`;

            fugir();

            if (cliquesNao >= 2) {
                abrirFinal(" Nem tenta fugir... você me ama sim 😏💖");
                cliquesNao = 0;
            }
        }

        function abrirFinal(texto) {
            document.getElementById("textoFinal").innerHTML = texto;
            document.getElementById("final").style.display = "flex";
        }

        function fecharFinal() {
            document.getElementById("final").style.display = "none";
        }

        function fugir() {
            const btn = document.getElementById("nao");

            const limiteX = window.innerWidth - btn.offsetWidth;
            const limiteY = window.innerHeight * 0.6;

            btn.style.position = "fixed";
            btn.style.left = Math.random() * limiteX + "px";
            btn.style.top = Math.random() * limiteY + "px";
        }

        setTimeout(() => {
            document.body.classList.add("noite");
        }, 10000);
    </script>

</body>

</html>
